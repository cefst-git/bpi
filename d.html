<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPI-82 Panamax</title>
<meta name="theme-color" content="#e8a93c">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

:root{
  --bg:#0a0e17; --surface:#0f1623; --s2:#141d2e; --s3:#1a2538;
  --border:#1f2e4a; --b2:#253550;
  --accent:#e8a93c;
  --cmin:#e84c3c; --cavg:#8899aa; --cmax:#3ce8a0;
  --text:#d0dff0; --dim:#5c7a99; --bright:#f0f8ff;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }
body{ display:flex; flex-direction:column; }

/* ── HEADER ── */
.header{
  display:flex; align-items:center; gap:14px; padding:10px 20px 9px;
  background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0;
}
.header h1{ font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2.5px; color:var(--accent); }
.header .sub{ font-family:'DM Mono',monospace; font-size:11px; color:var(--dim); letter-spacing:1px; text-transform:uppercase; }
.header-spacer{ flex:1; }
.h-stats{ display:flex; gap:6px; align-items:stretch; }
.h-stat{ display:flex; flex-direction:column; align-items:center; background:var(--s2); border:1px solid var(--b2); border-radius:8px; padding:4px 14px; min-width:200px; }
.h-stat .hl{ font-family:'DM Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin-bottom:2px; }
.h-stat .hv{ font-family:'DM Mono',monospace; font-size:22px; font-weight:500; line-height:1; letter-spacing:-0.5px; }
.h-stat.hmax .hv{ color:var(--cmax); }
.h-stat.havg .hv{ color:var(--cavg); }
.h-stat.hmin .hv{ color:var(--cmin); }
.hmax-v{ color:var(--cmax); }
.havg-v{ color:var(--cavg); }
.hmin-v{ color:var(--cmin); }
/* surplus/deficit card */
.h-stat.hsd .hv{ color:var(--cmax); }
.h-stat.hsd.deficit .hv{ color:var(--cmin); }

/* ── Y-AXIS GRADIENT MARKERS ── */
.ym{
  position:absolute; right:0; transform:translateY(-50%);
  width:14px; height:14px; border-radius:50%;
  border:2px solid #fff; cursor:ns-resize;
  box-shadow:0 1px 4px rgba(0,0,0,0.5);
  z-index:25; pointer-events:all;
}
.ym:hover{ box-shadow:0 0 0 3px rgba(255,255,255,0.2),0 1px 4px rgba(0,0,0,0.5); }
.ym-lbl{
  position:absolute; right:18px; top:50%; transform:translateY(-50%);
  font-family:'DM Mono',monospace; font-size:8px; color:#fff;
  background:rgba(10,14,23,0.75); border-radius:3px; padding:1px 4px;
  pointer-events:none; white-space:nowrap;
}
.theme-pill{ flex-shrink:0; width:36px; height:36px; border-radius:9px; position:relative; cursor:pointer; background:var(--s2); border:1px solid var(--b2); transition:background 0.2s; display:flex; align-items:center; justify-content:center; align-self:center; font-size:18px; }
.theme-pill:hover{ background:var(--s3); }
.theme-pill-thumb{ font-size:18px; line-height:1; pointer-events:none; }
.theme-pill-thumb::before{ content:'☀'; }
[data-theme="light"] .theme-pill-thumb::before{ content:'🌙'; filter:grayscale(1) brightness(0.4); }

/* ── MAIN ── */
.main{ flex:1; min-height:0; display:flex; }

/* ── CHART ── */
.chart-side{ flex:1; min-width:0; display:flex; flex-direction:column; padding:10px 10px 0 14px; }
.chart-wrap{ flex:1; min-height:0; position:relative; }
canvas{ width:100%!important; height:100%!important; display:block; }
.chart-overlay{ position:absolute; inset:0; cursor:crosshair; z-index:10; }

/* ── FLOATING CARD (draggable) ── */
.float-card{
  position:absolute; z-index:20; pointer-events:all;
  background:rgba(10,14,23,0.88); border:1px solid rgba(255,255,255,0.1);
  border-radius:10px; backdrop-filter:blur(8px);
  min-width:150px; user-select:none;
}
.float-handle{
  cursor:grab; padding:4px 8px 3px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex; align-items:center; justify-content:center;
}
.float-handle:active{ cursor:grabbing; }
.float-handle-grip{ font-size:10px; color:rgba(255,255,255,0.2); letter-spacing:-1px; }
.float-body{ padding:6px 10px 8px; display:flex; flex-direction:column; gap:5px; }
.csb{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
.csb-l{ font-family:'DM Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.8px; color:var(--dim); }
.csb-v{ font-family:'DM Mono',monospace; font-size:17px; font-weight:500; line-height:1; text-align:right; }
.csb.cmx .csb-v{ color:var(--cmax); }
.csb.cav .csb-v{ color:var(--cavg); }
.csb.cmn .csb-v{ color:var(--cmin); }
/* M Q Y toggle inside float card — ~60% smaller */
.float-tog{ display:flex; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:4px; overflow:hidden; }
.ftb{ flex:1; height:16px; font-family:'DM Mono',monospace; font-size:8px; font-weight:500; color:rgba(255,255,255,0.3); cursor:pointer; border:none; background:transparent; transition:background 0.12s,color 0.12s; padding:0 5px; }
.ftb:not(:last-child){ border-right:1px solid rgba(255,255,255,0.1); }
.ftb.on{ background:rgba(232,169,60,0.2); color:var(--accent); }
.ftb:hover:not(.on){ background:rgba(255,255,255,0.06); }

/* ── TOOLTIP ── */
.ctip{ position:absolute; pointer-events:none; background:rgba(10,14,23,0.92); border:1px solid var(--b2); border-radius:8px; padding:8px 12px; font-family:'DM Mono',monospace; font-size:12px; color:var(--text); white-space:nowrap; z-index:30; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.4); }
.ctip-date{ font-size:10px; color:var(--dim); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.8px; }
.ctip-val{ font-size:16px; font-weight:500; color:var(--accent); }
.ctip-lines{ margin-top:4px; display:flex; flex-direction:column; gap:2px; }
.ctip-ln{ font-size:10px; display:flex; gap:6px; }
.ctip-ln .cl{ color:var(--dim); }

/* ── RIGHT PANEL ── */
.panel{ width:268px; flex-shrink:0; display:flex; flex-direction:column; gap:8px; padding:10px 14px 10px 8px; overflow-y:auto; }
.panel::-webkit-scrollbar{ width:4px; }
.panel::-webkit-scrollbar-thumb{ background:var(--b2); border-radius:2px; }

/* ── CARDS ── */
.card{ display:flex; flex-direction:column; gap:6px; border-radius:10px; padding:10px 12px; flex-shrink:0; }
.card-lbl{ font-family:'DM Mono',monospace; font-size:9px; font-weight:400; text-transform:uppercase; letter-spacing:1.2px; line-height:1; color:rgba(255,255,255,0.28); }
.card.c-show { background:rgba(232,169,60,0.06); border:1px solid rgba(232,169,60,0.18); }
.card.c-omit { background:rgba(199,125,255,0.06); border:1px solid rgba(199,125,255,0.18); }
.card.c-lines{ background:rgba(60,136,232,0.06); border:1px solid rgba(60,136,232,0.18); }

/* toggles */
.tgl-row{ display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
.tog{ display:flex; background:var(--s2); border:1px solid var(--b2); border-radius:7px; overflow:hidden; flex-shrink:0; }
.tb{ flex:1; height:32px; display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:12px; font-weight:500; color:var(--dim); cursor:pointer; border:none; background:transparent; transition:background 0.12s,color 0.12s; padding:0 12px; white-space:nowrap; user-select:none; }
.tb:not(:last-child){ border-right:1px solid var(--b2); }
.tb.on{ background:rgba(232,169,60,0.16); color:var(--accent); }
.tb:hover:not(.on){ background:rgba(255,255,255,0.04); }

/* stepper */
.stepper{ display:flex; align-items:center; background:var(--s2); border:1px solid var(--b2); border-radius:7px; overflow:hidden; height:32px; flex-shrink:0; }
.sb{ width:32px; height:32px; display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:20px; font-weight:300; color:var(--dim); cursor:pointer; border:none; background:transparent; transition:background 0.1s,color 0.1s; line-height:1; user-select:none; }
.sb:hover{ background:rgba(255,255,255,0.06); }
.sb:first-child{ border-right:1px solid var(--b2); }
.sb:last-child{ border-left:1px solid var(--b2); }
.sb:active{ background:rgba(232,169,60,0.12); color:var(--accent); }
.sv{ min-width:32px; text-align:center; font-family:'DM Mono',monospace; font-size:14px; font-weight:500; color:var(--accent); }

/* eye button */
.eye-btn{ height:22px; padding:0 7px; display:flex; align-items:center; justify-content:center; background:var(--s2); border:1px solid var(--b2); border-radius:5px; cursor:pointer; transition:background 0.12s; user-select:none; flex-shrink:0; color:#ffffff; }
.eye-btn.on{ background:rgba(232,169,60,0.16); border-color:rgba(232,169,60,0.3); color:#ffffff; }
.eye-btn:hover:not(.on){ background:rgba(255,255,255,0.08); }
[data-theme="light"] .eye-btn{ color:#1a2540; }
[data-theme="light"] .eye-btn.on{ color:#1a2540; }

/* ── BOTTOM BAR ── */
.bottombar{
  background:var(--surface); border-top:1px solid var(--border);
  padding:5px 14px 6px;
  display:flex; gap:10px; align-items:center;
  flex-shrink:0; min-height:44px;
}
.bb-sect{ display:flex; align-items:center; gap:6px; flex-shrink:0; }
.bb-lbl{ font-family:'DM Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); white-space:nowrap; }
.bb-val{ font-family:'DM Mono',monospace; font-size:12px; font-weight:500; color:var(--accent); white-space:nowrap; }
.bb-sep{ width:1px; background:var(--border); align-self:stretch; flex-shrink:0; }
.hint{ font-family:'DM Mono',monospace; font-size:11px; color:var(--dim); font-style:italic; }

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#f0f4fc; --surface:#fff; --s2:#e8edf8; --s3:#dde3f2;
  --border:#c8d0e8; --b2:#b8c4de;
  --accent:#c27d10; --cmin:#c0312a; --cavg:#5a6e90; --cmax:#1a9e6a;
  --text:#1a2540; --dim:#6878a0; --bright:#0a1020;
}
[data-theme="light"] .float-card{ background:rgba(248,250,255,0.95); border-color:rgba(0,0,0,0.1); }
[data-theme="light"] .float-tog{ background:rgba(0,0,0,0.04); border-color:rgba(0,0,0,0.12); }
[data-theme="light"] .ftb{ color:rgba(0,0,0,0.3); }
[data-theme="light"] .ftb.on{ background:rgba(194,125,16,0.15); }
[data-theme="light"] .tb.on{ background:rgba(194,125,16,0.15); }
[data-theme="light"] .card.c-show{ background:rgba(194,125,16,0.07); border-color:rgba(194,125,16,0.22); }
[data-theme="light"] .card.c-omit{ background:rgba(140,80,200,0.07); border-color:rgba(140,80,200,0.22); }
[data-theme="light"] .card.c-lines{ background:rgba(40,100,200,0.07); border-color:rgba(40,100,200,0.22); }
/* stronger selection band shading in light mode */
[data-theme="light"] canvas{ --sel-band:rgba(194,125,16,0.22); --minmax-band:rgba(194,125,16,0.14); }
/* index multiplier widget */
.idx-wrap{ display:flex; flex-direction:column; align-items:center; gap:2px; background:var(--s2); border:1px solid rgba(60,136,232,0.35); border-radius:8px; padding:4px 14px; align-self:stretch; justify-content:center; min-width:90px; }
.idx-lbl{ font-family:'DM Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:1px; color:rgba(60,136,232,0.7); white-space:nowrap; }
.idx-val{ font-family:'DM Mono',monospace; font-size:18px; font-weight:500; color:#7ab4f5; letter-spacing:-0.5px; }
.be-wrap{ display:flex; flex-direction:column; align-items:center; gap:2px; background:var(--s2); border:1px solid var(--b2); border-radius:8px; padding:4px 14px; align-self:stretch; justify-content:center; min-width:100px; }
.be-lbl{ font-family:'DM Mono',monospace; font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); white-space:nowrap; }
.be-input{ font-family:'DM Mono',monospace; font-size:18px; font-weight:500; color:#f0a020; background:transparent; border:none; outline:none; width:78px; text-align:right; letter-spacing:-0.5px; }
.be-input:focus{ color:var(--accent); }
/* small inline eye buttons */
.ie-btn{ display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:5px; border:1px solid var(--b2); background:var(--s2); cursor:pointer; color:#ffffff; transition:background 0.12s; flex-shrink:0; padding:0; }
.ie-btn:hover{ background:var(--s3); }
[data-theme="light"] .ie-btn{ color:#1a2540; }
[data-theme="light"] #gradToggleBtn{ color:#1a2540; }
#gradToggleBtn{ color:#ffffff; }
/* undo button */
.undo-btn{ display:flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:9px; border:1px solid var(--b2); background:var(--s2); cursor:pointer; color:var(--dim); font-size:18px; transition:background 0.15s, color 0.15s; flex-shrink:0; align-self:center; margin-left:30px; margin-right:5px; }
.undo-btn:hover{ background:var(--s3); color:var(--text); }
.undo-btn:active{ color:var(--accent); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>BPI-82</h1>
  <span class="sub">Panamax · 1990–2026</span>
  <div class="header-spacer"></div>
  <div class="h-stats">
    <div class="h-stat" style="flex-direction:row;gap:10px;padding:4px 14px;align-items:center;">
      <div style="display:flex;gap:14px;align-items:flex-start;flex:1;">
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="hl">MAX</div><div class="hv hmax-v" id="hMax">—</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="hl">AVG</div><div class="hv havg-v" id="hAvg">—</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="hl">MIN</div><div class="hv hmin-v" id="hMin">—</div>
        </div>
      </div>
      <button class="ie-btn" id="linesEyeBtn" title="Show/hide MIN/AVG/MAX lines" style="flex-shrink:0;align-self:center;"></button>
    </div>
  </div>
  <div class="h-stat hsd" id="hSdCard" style="min-width:120px;">
    <div class="hl" id="hSdLbl">Surplus / Deficit</div>
    <div class="hv" id="hSd">—</div>
    <div class="hl" id="hDays" style="margin-top:2px;"></div>
  </div>
  <div class="idx-wrap">
    <div class="idx-lbl">Index</div>
    <div style="display:flex;align-items:center;gap:4px;">
      <span class="idx-val" id="idxVal">100%</span>
      <div style="display:flex;flex-direction:column;gap:1px;">
        <button class="ie-btn" id="idxUp" style="height:11px;width:18px;font-size:7px;border-radius:2px;line-height:1;" title="+1%">▲</button>
        <button class="ie-btn" id="idxDn" style="height:11px;width:18px;font-size:7px;border-radius:2px;line-height:1;" title="-1%">▼</button>
      </div>
    </div>
  </div>
  <div class="be-wrap" style="flex-direction:row;align-items:center;gap:10px;">
    <div style="display:flex;flex-direction:column;align-items:center;">
      <div class="be-lbl">B/E</div>
      <div style="display:flex;align-items:center;gap:3px;">
        <input class="be-input" id="beInput" type="text" value="12,000" inputmode="numeric">
        <div style="display:flex;flex-direction:column;gap:1px;">
          <button class="ie-btn" id="beUp" style="height:11px;width:18px;font-size:7px;border-radius:2px;line-height:1;" title="+100">▲</button>
          <button class="ie-btn" id="beDn" style="height:11px;width:18px;font-size:7px;border-radius:2px;line-height:1;" title="-100">▼</button>
        </div>
      </div>
    </div>
    <button class="ie-btn" id="beEyeBtn" title="Show/hide B/E line" style="flex-shrink:0;align-self:center;"></button>
  </div>
  <button class="undo-btn" id="undoBtn" title="Undo last selection (Ctrl+Z)">↩</button>
  <button class="undo-btn" id="resetBtn" title="Reset all" style="margin-left:0;font-size:14px;">⟳</button>
  <button class="undo-btn" id="gradToggleBtn" title="Show/hide gradient markers" style="margin-left:0;margin-right:0;padding:0;"></button>
  <div class="theme-pill" id="themeBtn"><div class="theme-pill-thumb"></div></div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- CHART SIDE -->
  <div class="chart-side">
    <div class="chart-wrap" id="chartWrap">
      <canvas id="mainChart"></canvas>
      <div class="chart-overlay" id="chartOverlay"></div>

      <!-- Y-AXIS GRADIENT MARKERS -->
      <div id="yGradMarkers" style="display:none;">
        <div class="ym" id="gm5"  data-color="rgba(0,0,0,0.9)"       data-border="#555">   <div class="ym-lbl" id="gm5l">5k</div></div>
        <div class="ym" id="gm7"  data-color="rgba(90,15,15,1)"      data-border="#c04040"><div class="ym-lbl" id="gm7l">7k</div></div>
        <div class="ym" id="gm9"  data-color="rgba(220,60,60,1)"     data-border="#ff8080"><div class="ym-lbl" id="gm9l">9k</div></div>
        <div class="ym" id="gmBE" data-color="rgba(200,140,40,1)"    data-border="#f0a020"><div class="ym-lbl" id="gmBEl">B/E</div></div>
        <div class="ym" id="gm17" data-color="rgba(60,220,120,1)"    data-border="#90ffb0"><div class="ym-lbl" id="gm17l">17k</div></div>
        <div class="ym" id="gm24" data-color="rgba(20,90,50,1)"      data-border="#40c080"><div class="ym-lbl" id="gm24l">24k</div></div>
      </div>

      <!-- DRAGGABLE FLOATING CARD -->
      <div class="float-card" id="floatCard" style="right:14px;top:50%;transform:translateY(-50%);">
        <div class="float-handle" id="floatHandle">
          <span class="float-handle-grip" style="width:100%;text-align:center;">⣿</span>
        </div>
        <div class="float-body">
          <div class="csb cmx"><span class="csb-l">MAX</span><span class="csb-v" id="cMax">—</span></div>
          <div class="csb cav"><span class="csb-l">AVG</span><span class="csb-v" id="cAvg">—</span></div>
          <div class="csb cmn"><span class="csb-l">MIN</span><span class="csb-v" id="cMin">—</span></div>
          <div class="float-tog" id="floatLinesTgl" style="align-self:flex-end;margin-top:2px;">
            <button class="ftb" data-idx="0">M</button>
            <button class="ftb on" data-idx="1">Q</button>
            <button class="ftb" data-idx="2">Y</button>
          </div>
          <div style="height:1px;background:rgba(255,255,255,0.07);margin:1px 0;"></div>
          <div id="floatRange" style="font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);text-align:right;display:none;"></div>
          <div id="floatOmit" style="font-family:'DM Mono',monospace;font-size:9px;color:var(--cmin);text-align:right;display:none;"></div>
          <div id="floatIdx" style="font-family:'DM Mono',monospace;font-size:9px;color:#7ab4f5;text-align:right;display:none;"></div>
          <div style="height:1px;background:rgba(255,255,255,0.07);margin:2px 0;" id="floatSdSep" style="display:none;"></div>
          <div id="floatSdLbl" style="font-family:'DM Mono',monospace;font-size:7px;text-transform:uppercase;letter-spacing:0.8px;text-align:right;display:none;"></div>
          <div id="floatSd" style="font-family:'DM Mono',monospace;font-size:13px;font-weight:500;text-align:right;display:none;"></div>
          <div id="floatDays" style="font-family:'DM Mono',monospace;font-size:9px;color:var(--dim);text-align:right;display:none;"></div>
        </div>
      </div>

      <div class="ctip" id="ctip">
        <div class="ctip-date" id="ctipDate"></div>
        <div class="ctip-val" id="ctipVal"></div>
        <div class="ctip-lines" id="ctipLines"></div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL (hidden — controls moved to bottom bar) -->
  <div class="panel" style="display:none;"></div>
</div>

<!-- Hidden control stubs for JS sync (panel removed but IDs needed) -->
<div style="display:none">

        });
      }

      // Multi-level x axis
      const visMin=s.x.min??0, visMax=s.x.max??allData.length-1;
      const pxpm=(xR-xL)/Math.max(visMax-visMin+1,1);
      const showQ=pxpm>=4, showM=pxpm>=13;
      const rowH=12, yr0=yB+4, qr0=yB+4+rowH, mr0=yB+4+rowH*2;
      c.save(); c.font='10px DM Mono,monospace';
      for(let i=Math.max(0,Math.floor(visMin));i<=Math.min(allData.length-1,Math.ceil(visMax));i++){
        const d=allData[i]; const x=s.x.getPixelForValue(i);
        if(x<xL-1||x>xR+1)continue;
        if(d.month===0){ c.strokeStyle='#2a3f60';c.lineWidth=1;c.beginPath();c.moveTo(x,yB);c.lineTo(x,yB+3);c.stroke();c.fillStyle='#7a9ab8';c.fillText(String(d.year),x+2,yr0+9); }
        if(showQ&&d.month%3===0){ if(d.month!==0){c.strokeStyle='#1e3050';c.lineWidth=1;c.beginPath();c.moveTo(x,yB);c.lineTo(x,yB+2);c.stroke();}c.fillStyle='#4a6a88';c.fillText(QABBR[d.quarter],x+2,qr0+9); }
        if(showM){ if(d.month%3!==0){c.strokeStyle='#1a2840';c.lineWidth=0.5;c.beginPath();c.moveTo(x,yB);c.lineTo(x,yB+1.5);c.stroke();}c.fillStyle='#384e64';c.fillText(MABBR[d.month],x+1,mr0+9); }
      }
      c.restore();

      // Hover line
      if(typeof window.hoverX==='number'&&window.hoverX>=xL&&window.hoverX<=xR){
        c.save();c.strokeStyle='rgba(232,169,60,0.3)';c.lineWidth=1;c.setLineDash([4,3]);c.beginPath();c.moveTo(window.hoverX,ca.top);c.lineTo(window.hoverX,ca.bottom);c.stroke();c.restore();
      }
    }
  }]
});

// Zoom state independent of selection
let zoomMin = 0, zoomMax = allData.length - 1, isZoomed = false;

function applyZoom(){
  if(isZoomed){
    chart.options.scales.x.min = zoomMin;
    chart.options.scales.x.max = zoomMax;
  } else {
    // if showOnly + selection, let updateChart handle it; otherwise clear zoom
    if(!showOnly){ delete chart.options.scales.x.min; delete chart.options.scales.x.max; }
  }
  chart.update('none');
}

overlay.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = document.getElementById('mainChart').getBoundingClientRect();
  const mouseFrac = (e.clientX - rect.left) / rect.width; // 0=left 1=right

  // Determine current visible range
  const curMin = isZoomed ? zoomMin : 0;
  const curMax = isZoomed ? zoomMax : allData.length - 1;
  const YEAR = 12; // months per year step

  // How much to trim from each edge based on mouse position
  // mouseFrac < 0.33 → trim more from right; > 0.67 → more from left; middle → equal
  let trimLeft, trimRight;
  if(e.deltaY < 0){ // zoom in
    if(mouseFrac < 0.33){      trimLeft = 0;    trimRight = YEAR * 2; }
    else if(mouseFrac > 0.67){ trimLeft = YEAR * 2; trimRight = 0;    }
    else{                      trimLeft = YEAR;     trimRight = YEAR;  }
  } else { // zoom out
    if(mouseFrac < 0.33){      trimLeft = 0;    trimRight = -(YEAR * 2); }
    else if(mouseFrac > 0.67){ trimLeft = -(YEAR * 2); trimRight = 0;    }
    else{                      trimLeft = -YEAR;        trimRight = -YEAR; }
  }

  let newMin = curMin + trimLeft;
  let newMax = curMax - trimRight;

  // Clamp to data bounds and ensure minimum 12 months visible
  newMin = Math.max(0, newMin);
  newMax = Math.min(allData.length - 1, newMax);
  if(newMax - newMin < 11) return; // don't zoom below 1 year

  // If we've returned to full range, cancel zoom
  if(newMin <= 0 && newMax >= allData.length - 1){
    isZoomed = false; zoomMin = 0; zoomMax = allData.length - 1;
  } else {
    isZoomed = true; zoomMin = newMin; zoomMax = newMax;
  }
  applyZoom();
}, { passive: false });
overlay.addEventListener('mouseleave', ()=>{ window.hoverX=null; ctip.style.display='none'; chart.update('none'); });

// ===== SELECTION =====
let dragging=false, dragStartKey=null;
let selHistory=[]; // undo stack of previous selKeys Sets

function countMonthsInKeys(keys, unit){
  if(unit==='M') return keys.size;
  if(unit==='Q') return keys.size * 3;
  return keys.size * 12;
}

function commitSelection(newKeys){
  if(newKeys.size > 0 && countMonthsInKeys(newKeys, selUnit) < 3){
    // Too short — revert to no selection (show full range)
    selKeys = new Set();
  } else {
    if(selKeys.size > 0) selHistory.push(new Set(selKeys));
    if(selHistory.length > 50) selHistory.shift();
    selKeys = newKeys;
  }
  updateChart();
}

function pixelToKey(cx){ const rect=document.getElementById('mainChart').getBoundingClientRect(); const sc=chart.scales.x; const idx=Math.max(0,Math.min(allData.length-1,Math.round(sc.getValueForPixel(cx-rect.left)))); return getPeriodKey(allData[idx],selUnit); }
function handleDrag(cx){ selKeys=keysBetween(dragStartKey,pixelToKey(cx),selUnit); updateChart(); }
overlay.addEventListener('mousedown',e=>{
  const clickKey = pixelToKey(e.clientX);
  if(selKeys.size > 0 && selKeys.has(clickKey) && showOnly){
    // Clicked inside the zoomed selection — revert to full view
    selHistory.push(new Set(selKeys));
    selKeys = new Set();
    showOnly = false;
    // Sync the FULL/SELECTED toggle
    document.querySelectorAll('#showTgl .tb').forEach(b=>b.classList.toggle('on',b.dataset.v==='full'));
    updateChart();
    return;
  }
  dragging=true; dragStartKey=clickKey; selKeys=new Set([dragStartKey]); updateChart();
});
window.addEventListener('mousemove',e=>{ if(!dragging)return; handleDrag(e.clientX); });
window.addEventListener('mouseup',()=>{
  if(dragging){ dragging=false; commitSelection(selKeys); dragStartKey=null; }
});

// ===== DATA LOGIC =====
function groupBy(months,unit){ const map={}; months.forEach(d=>{ const key=unit==='QUARTERS'?d.year+'-Q'+(d.quarter+1):String(d.year); if(!map[key])map[key]={key,months:[],avg:0}; map[key].months.push(d); }); Object.values(map).forEach(g=>{g.avg=g.months.reduce((s,d)=>s+d.value,0)/g.months.length;}); return Object.values(map).sort((a,b)=>a.key<b.key?-1:1); }
function omitFromSelection(sel){ if(omitN===0)return sel; if(omitUnit==='MONTHS'){ const bad=new Set([...sel].sort((a,b)=>omitDir==='TOP'?b.value-a.value:a.value-b.value).slice(0,omitN).map(d=>d.label)); return sel.filter(d=>!bad.has(d.label)); } const groups=groupBy(sel,omitUnit); const badKeys=new Set([...groups].sort((a,b)=>omitDir==='TOP'?b.avg-a.avg:a.avg-b.avg).slice(0,omitN).map(g=>g.key)); return sel.filter(d=>!badKeys.has(omitUnit==='QUARTERS'?d.year+'-Q'+(d.quarter+1):String(d.year))); }
function computeLines(months){ if(!months.length)return null; const lu=UNIT_NAMES[linesUnit]; const vals=lu==='MONTHS'?months.map(d=>iv(d.value)):groupBy(months,lu).map(g=>iv(g.avg)); if(!vals.length)return null; return{mn:Math.min(...vals),mx:Math.max(...vals),avg:Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)}; }

function updateChart(){
  const selected=selKeys.size>0?allData.filter(d=>selKeys.has(getPeriodKey(d,selUnit))):[];
  const final=omitFromSelection(selected);
  const finalSet=new Set(final.map(d=>d.label));
  chart.data.datasets[0].data=allData.map(d=>iv(d.value));
  chart.data.datasets[1].data=allData.map(d=>finalSet.has(d.label)?iv(d.value):null);
  if(showOnly&&final.length>0){ const s=final.slice().sort((a,b)=>a.date-b.date); const si=allData.indexOf(s[0]),ei=allData.indexOf(s[s.length-1]); chart.options.scales.x.min=Math.max(0,si-1); chart.options.scales.x.max=Math.min(allData.length-1,ei+1); }
  else if(isZoomed){ chart.options.scales.x.min=zoomMin; chart.options.scales.x.max=zoomMax; }
  else{ delete chart.options.scales.x.min; delete chart.options.scales.x.max; }
  const lines=computeLines(final); window.curLines=lines;
  window.curFinalSet=finalSet; window.curSelSize=selKeys.size;
  chart.update('none');
  const fmt=v=>Math.round(v).toLocaleString();
  ['hMax','cMax'].forEach(id=>document.getElementById(id).textContent=lines?fmt(lines.mx):'—');
  ['hAvg','cAvg'].forEach(id=>document.getElementById(id).textContent=lines?fmt(lines.avg):'—');
  ['hMin','cMin'].forEach(id=>document.getElementById(id).textContent=lines?fmt(lines.mn):'—');
  // Float card: range dates + omitting label
  const fo=document.getElementById('floatOmit');
  const fr=document.getElementById('floatRange');
  if(fr){
    if(final.length>0){ const fsrt=final.slice().sort((a,b)=>a.date-b.date); const ffd=fmtDate(fsrt[0].date),fld=fmtDate(fsrt[fsrt.length-1].date); fr.textContent=ffd===fld?ffd:ffd+' – '+fld; fr.style.display='block'; }
    else{ fr.style.display='none'; }
  }
  if(fo){ if(omitN>0){fo.textContent='omitting '+omitN+' '+omitDir.toLowerCase()+' '+omitUnit.toLowerCase();fo.style.display='block';}else{fo.style.display='none';} }

  // Float card index rate
  const fi=document.getElementById('floatIdx');
  if(fi){ if(indexMult!==1){ fi.textContent='index '+Math.round(indexMult*100)+'%'; fi.style.display='block'; }else{ fi.style.display='none'; } }

  // ── CUMULATIVE SURPLUS / DEFICIT (rate × days vs B/E) ──
  // Each month: (iv(monthly_rate) - beValue) × days_in_that_month
  const sdCard=document.getElementById('hSdCard');
  const sdEl=document.getElementById('hSd');
  const sdLblEl=document.getElementById('hSdLbl');
  const fSdSep=document.getElementById('floatSdSep');
  const fSdLbl=document.getElementById('floatSdLbl');
  const fSdEl=document.getElementById('floatSd');
  function daysInMonth(d){ return new Date(d.year, d.month+1, 0).getDate(); }
  if(final.length>0){
    let cumSD=0, totalDays=0;
    final.forEach(d=>{ const days=daysInMonth(d); totalDays+=days; cumSD+=(iv(d.value)-beValue)*days; });
    const isSurplus=cumSD>=0;
    const sdStr=(isSurplus?'+':'-')+Math.abs(Math.round(cumSD)).toLocaleString();
    const sdColor=isSurplus?'var(--cmax)':'var(--cmin)';
    const sdWord=isSurplus?'Surplus':'Deficit';
    if(sdEl){sdEl.textContent=sdStr;sdEl.style.color=sdColor;}
    if(sdLblEl){sdLblEl.textContent=sdWord+' vs B/E';}
    if(sdCard){sdCard.classList.toggle('deficit',!isSurplus);}
    if(fSdSep)fSdSep.style.display='block';
    if(fSdLbl){fSdLbl.textContent=sdWord+' vs B/E';fSdLbl.style.color=sdColor;fSdLbl.style.display='block';}
    if(fSdEl){fSdEl.textContent=sdStr;fSdEl.style.color=sdColor;fSdEl.style.display='block';}
    // Days in bottom bar, float card and header
    const yy=Math.floor(totalDays/365), rem=totalDays%365, mm=Math.floor(rem/30), dd=rem%30;
    window.selDays={total:totalDays,yy,mm,dd};
    const daysStr=String(totalDays).padStart(4,'0')+' days';
    const fDays=document.getElementById('floatDays');
    if(fDays){fDays.textContent=daysStr;fDays.style.display='block';}
    const hDays=document.getElementById('hDays');
    if(hDays){hDays.textContent=daysStr;}
  } else {
    if(sdEl)sdEl.textContent='—';
    if(sdLblEl)sdLblEl.textContent='Surplus / Deficit';
    if(sdCard)sdCard.classList.remove('deficit');
    if(fSdSep)fSdSep.style.display='none';
    if(fSdLbl)fSdLbl.style.display='none';
    if(fSdEl)fSdEl.style.display='none';
    const fDays2=document.getElementById('floatDays'); if(fDays2)fDays2.style.display='none';
    const hDays2=document.getElementById('hDays'); if(hDays2)hDays2.textContent='';
    window.selDays=null;
  }
  const bar=document.getElementById('bottomBar');
  if(!final.length && selKeys.size===0){ bar.innerHTML='<div class="hint">Click or drag the chart to select a period</div>'; return; }
  if(!final.length){ bar.innerHTML='<div class="hint">Nothing remains after omit</div>'; return; }
  const srt=final.slice().sort((a,b)=>a.date-b.date);
  const fd=fmtDate(srt[0].date), ld=fmtDate(srt[srt.length-1].date);
  const sAvg=Math.round(final.reduce((s,d)=>s+d.value,0)/final.length);
  const eyeSvgOn  = `<svg width="14" height="10" viewBox="0 0 20 14" fill="none"><path d="M10 2C5.5 2 2 7 2 7s3.5 5 8 5 8-5 8-5-3.5-5-8-5z" stroke="currentColor" stroke-width="1.6"/><circle cx="10" cy="7" r="2.5" stroke="currentColor" stroke-width="1.6"/></svg>`;
  const eyeSvgOff = `<svg width="14" height="10" viewBox="0 0 20 14" fill="none"><path d="M10 2C5.5 2 2 7 2 7s3.5 5 8 5 8-5 8-5-3.5-5-8-5z" stroke="currentColor" stroke-width="1.6"/><circle cx="10" cy="7" r="2.5" stroke="currentColor" stroke-width="1.6"/><line x1="3" y1="1" x2="17" y2="13" stroke="currentColor" stroke-width="1.8"/></svg>`;
  const omitHtml='';
  bar.innerHTML=`
    <div class="bb-sect">
      <button class="eye-btn ${showFullRange?'on':''}" id="eyeBtn" title="Show/hide full series" style="padding:0 8px;">${showFullRange?eyeSvgOn:eyeSvgOff}</button>
      <span class="bb-lbl">Full Range</span>

    </div>
    <div class="bb-sep"></div>
    <div class="bb-sect">
      <span class="bb-lbl">Selected Range</span>
      <span class="bb-val">${fd} – ${ld}</span>
      ${window.selDays ? `<span class="bb-lbl" style="margin-left:4px;">${window.selDays.total.toString().padStart(4,'0')} days &nbsp;·&nbsp; ${String(window.selDays.yy).padStart(2,'0')}Y ${String(window.selDays.mm).padStart(2,'0')}M ${String(window.selDays.dd).padStart(2,'0')}D</span>` : ''}
      <span class="bb-lbl">Show</span>
      <div class="tog" id="showTglBar" style="height:28px;">
        <button class="tb ${!showOnly?'on':''}" data-v="full" style="height:28px;font-size:11px;padding:0 9px;">FULL</button>
        <button class="tb ${showOnly?'on':''}" data-v="sel" style="height:28px;font-size:11px;padding:0 9px;">SELECTED</button>
      </div>

    ${omitHtml}

      <div class="tog" id="dirTglBar">

        <button class="tb ${omitDir==='BOTTOM'?'on':''}" data-val="BOTTOM" style="height:17px;font-size:7px;padding:0 4px;">⤓ BOT</button>

  `;
  // Wire up bottom bar controls
  document.getElementById('eyeBtn').addEventListener('click',()=>{

// Eye button SVGs
function eyeSvg(on){ return on
  ? `<svg width="13" height="9" viewBox="0 0 20 14" fill="none"><path d="M10 2C5.5 2 2 7 2 7s3.5 5 8 5 8-5 8-5-3.5-5-8-5z" stroke="currentColor" stroke-width="1.6"/><circle cx="10" cy="7" r="2.5" stroke="currentColor" stroke-width="1.6"/></svg>`
  : `<svg width="13" height="9" viewBox="0 0 20 14" fill="none"><path d="M10 2C5.5 2 2 7 2 7s3.5 5 8 5 8-5 8-5-3.5-5-8-5z" stroke="currentColor" stroke-width="1.6"/><circle cx="10" cy="7" r="2.5" stroke="currentColor" stroke-width="1.6"/><line x1="3" y1="1" x2="17" y2="13" stroke="currentColor" stroke-width="1.8"/></svg>`;
}
const beEyeBtn=document.getElementById('beEyeBtn');
const linesEyeBtn=document.getElementById('linesEyeBtn');
beEyeBtn.innerHTML=eyeSvg(true);
linesEyeBtn.innerHTML=eyeSvg(true);
beEyeBtn.addEventListener('click',()=>{ showBE=!showBE; beEyeBtn.innerHTML=eyeSvg(showBE); chart.update('none'); });
linesEyeBtn.addEventListener('click',()=>{ showLines=!showLines; linesEyeBtn.innerHTML=eyeSvg(showLines); chart.update('none'); });
// ===== Y-AXIS GRADIENT MARKERS =====
let showGradMarkers = false;

const gradMarkers = [
  { id:'gm5',  lblId:'gm5l',  getVal:()=>gVal5,  setVal:v=>{gVal5=v;}  },
  { id:'gm7',  lblId:'gm7l',  getVal:()=>gVal7,  setVal:v=>{gVal7=v;}  },
  { id:'gm9',  lblId:'gm9l',  getVal:()=>gVal9,  setVal:v=>{gVal9=v;}  },
  { id:'gmBE', lblId:'gmBEl', getVal:()=>beValue, setVal:v=>{beValue=v; document.getElementById('beInput').value=fmtBE(v);}  },
  { id:'gm17', lblId:'gm17l', getVal:()=>gVal17, setVal:v=>{gVal17=v;} },
  { id:'gm24', lblId:'gm24l', getVal:()=>gVal24, setVal:v=>{gVal24=v;} },
];

// Apply background colours from data- attrs
gradMarkers.forEach(m => {
  const el = document.getElementById(m.id);
  el.style.background = el.dataset.color;
  el.style.borderColor = el.dataset.border;
});

function fmtGradLbl(v){ return v >= 1000 ? (v/1000).toFixed(0)+'k' : String(v); }

function updateYMarkerPositions(){
  const wrapRect = document.getElementById('chartWrap').getBoundingClientRect();
  const sc = chart.scales.y;
  if(!sc) return;
  const chartRect = document.getElementById('mainChart').getBoundingClientRect();
  const offsetTop = chartRect.top - wrapRect.top; // canvas top within chartWrap

  gradMarkers.forEach(m => {
    const el = document.getElementById(m.id);
    const lbl = document.getElementById(m.lblId);
    const yPx = sc.getPixelForValue(iv(m.getVal())) + offsetTop;
    el.style.top = yPx + 'px';
    lbl.textContent = m.id === 'gmBE' ? 'B/E ' + fmtGradLbl(m.getVal()) : fmtGradLbl(m.getVal());
  });
}

// Drag: move marker vertically, convert Y pixel back to value
let ymDragging = null;
gradMarkers.forEach(m => {
  const el = document.getElementById(m.id);
  el.addEventListener('mousedown', e => {
    e.preventDefault(); e.stopPropagation();
    ymDragging = m;
  });
});
window.addEventListener('mousemove', e => {
  if(!ymDragging) return;
  const wrapRect = document.getElementById('chartWrap').getBoundingClientRect();
  const chartRect = document.getElementById('mainChart').getBoundingClientRect();
  const offsetTop = chartRect.top - wrapRect.top;
  const sc = chart.scales.y;
  const relY = e.clientY - chartRect.top;
  const rawVal = sc.getValueForPixel(relY);
  const snapped = Math.round(rawVal / 500) * 500;
  ymDragging.setVal(Math.max(0, Math.min(150000, snapped)));
  updateYMarkerPositions();
  chart.update('none');
});
window.addEventListener('mouseup', () => { ymDragging = null; });

// Thermometer toggle — SVG icon
function thermSvg(on){
  // Thermometer: thin stem + bulb at bottom, with a 45° line crossing when off
  const stroke = `stroke="currentColor"`;
  const base = `<svg width="18" height="22" viewBox="0 0 18 22" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="7.5" y="1" width="3" height="13" rx="1.5" ${stroke} stroke-width="1.5"/>
    <circle cx="9" cy="17" r="3.5" ${stroke} stroke-width="1.5"/>
    <line x1="9" y1="4" x2="9" y2="14" stroke="#f0a020" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="9" cy="17" r="2" fill="#f0a020"/>
    ${!on ? `<line x1="2" y1="2" x2="16" y2="20" stroke="currentColor" stroke-width="1.8"/>` : ''}
  </svg>`;
  return base;
}

const gradToggleBtn = document.getElementById('gradToggleBtn');
gradToggleBtn.innerHTML = thermSvg(true);   // default: plain thermometer (markers hidden)
gradToggleBtn.style.opacity = '0.6';

gradToggleBtn.addEventListener('click', () => {
  showGradMarkers = !showGradMarkers;
  document.getElementById('yGradMarkers').style.display = showGradMarkers ? 'block' : 'none';
  gradToggleBtn.innerHTML = thermSvg(!showGradMarkers); // crossed when active
  gradToggleBtn.style.opacity = showGradMarkers ? '1' : '0.6';
  if(showGradMarkers) updateYMarkerPositions();
});

// Reposition markers after chart renders and on resize
chart.options.animation = { duration:120, onComplete: ()=>{ if(showGradMarkers) updateYMarkerPositions(); } };
window.addEventListener('resize', ()=>{ if(showGradMarkers) setTimeout(updateYMarkerPositions,50); });

// INDEX stepper
function setIndexMult(v){
  indexMult = Math.max(0.75, Math.min(1.25, Math.round(v * 100) / 100));
  document.getElementById('idxVal').textContent = Math.round(indexMult*100) + '%';
  document.getElementById('idxVal').style.color = indexMult===1 ? '#7ab4f5' : indexMult>1 ? '#3ce8a0' : '#e84c3c';
  updateChart();
}
document.getElementById('idxUp').addEventListener('click',()=>setIndexMult(indexMult+0.01));
document.getElementById('idxDn').addEventListener('click',()=>setIndexMult(indexMult-0.01));
// Scroll wheel on the index widget
document.querySelector('.idx-wrap').addEventListener('wheel',e=>{
  e.preventDefault(); setIndexMult(indexMult+(e.deltaY<0?0.01:-0.01));
},{passive:false});
const beInputEl = document.getElementById('beInput');
function fmtBE(v){ return v.toLocaleString(); }

document.getElementById('beUp').addEventListener('click',()=>{ beValue+=100; beInputEl.value=fmtBE(beValue); if(showGradMarkers)updateYMarkerPositions(); updateChart(); });
document.getElementById('beDn').addEventListener('click',()=>{ beValue=Math.max(0,beValue-100); beInputEl.value=fmtBE(beValue); if(showGradMarkers)updateYMarkerPositions(); updateChart(); });
function parseBE(s){ return parseInt(s.replace(/[,\s]/g,''),10); }
beInputEl.addEventListener('focus', e => { e.target.value = beValue; e.target.select(); });
beInputEl.addEventListener('blur', e => {
  const v = parseBE(e.target.value);
  if(!isNaN(v) && v >= 0){ beValue=v; } 
  e.target.value = fmtBE(beValue);
  if(showGradMarkers) updateYMarkerPositions();
  updateChart();
});
beInputEl.addEventListener('keydown', e => {
  if(e.key==='Enter'){ e.target.blur(); }
});
// Wheel to adjust B/E by 500
beInputEl.addEventListener('wheel', e => {
  e.preventDefault();
  beValue = Math.max(0, beValue + (e.deltaY < 0 ? 500 : -500));
  beInputEl.value = fmtBE(beValue);
  if(showGradMarkers) updateYMarkerPositions();
  updateChart();
}, { passive:false });

// ===== THEME =====
const themeBtn=document.getElementById('themeBtn');
function applyTheme(dark){
  document.documentElement.dataset.theme=dark?'dark':'light';
  const gc=dark?'#111827':'#e0e6f4', bc=dark?'#1f2e4a':'#c8d0e8', tc=dark?'#5c7a99':'#6878a0';
  chart.data.datasets[0].borderColor=showFullRange?(dark?'rgba(60,136,232,0.55)':'rgba(40,100,210,0.65)'):'rgba(60,136,232,0.08)';
  chart.data.datasets[0].backgroundColor=dark?'rgba(60,136,232,0.05)':'rgba(60,136,232,0.09)';
  chart.options.scales.x.grid.color=chart.options.scales.y.grid.color=gc;
  chart.options.scales.x.border.color=chart.options.scales.y.border.color=bc;
  chart.options.scales.x.ticks.color=chart.options.scales.y.ticks.color=tc;
  chart.update('none');
}
let isDark=true;
themeBtn.addEventListener('click',()=>{ isDark=!isDark; applyTheme(isDark); });
applyTheme(isDark);

updateChart();
</script>

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(e => console.log('SW:', e));
  });
}
