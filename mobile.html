<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BPI-82</title>
<meta name="theme-color" content="#e8a93c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BPI-82">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png">
<link rel="icon" type="image/x-icon" href="icons/favicon.ico">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap');
:root{
  --bg:#0a0e17; --surface:#0f1623; --s2:#141d2e; --s3:#1a2538;
  --border:#1f2e4a; --b2:#253550;
  --accent:#e8a93c; --cmin:#e84c3c; --cavg:#8899aa; --cmax:#3ce8a0;
  --text:#d0dff0; --dim:#5c7a99; --bright:#f0f8ff;
}
[data-theme="light"]{
  --bg:#f0f4fc; --surface:#fff; --s2:#e8edf8; --s3:#dde3f2;
  --border:#c8d0e8; --b2:#b8c4de;
  --accent:#c27d10; --cmin:#c0312a; --cavg:#5a6e90; --cmax:#1a9e6a;
  --text:#1a2540; --dim:#6878a0; --bright:#0a1020;
}
*{ box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body{ height:100%; width:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; }
body{ display:flex; flex-direction:column; }

/* rotate prompt */
.rotate-prompt{ display:none; position:fixed; inset:0; z-index:9999; background:var(--bg); flex-direction:column; align-items:center; justify-content:center; gap:20px; text-align:center; padding:32px; }
.rotate-prompt.visible{ display:flex; }
.rotate-icon{ font-size:64px; animation:rotatePulse 2s ease-in-out infinite; }
@keyframes rotatePulse{ 0%,100%{ transform:rotate(0deg) scale(1); } 50%{ transform:rotate(-90deg) scale(1.08); } }
.rotate-title{ font-family:'Bebas Neue',sans-serif; font-size:28px; letter-spacing:2px; color:var(--accent); }
.rotate-sub{ font-family:'DM Mono',monospace; font-size:11px; color:var(--dim); letter-spacing:0.8px; text-transform:uppercase; }

/* topbar */
.topbar{ display:flex; align-items:center; gap:6px; padding:5px 8px 5px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.topbar h1{ font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:2px; color:var(--accent); }
.topbar .sub{ font-family:'DM Mono',monospace; font-size:8px; color:var(--dim); letter-spacing:0.8px; text-transform:uppercase; }
.topbar-spacer{ flex:1; }
.tp-btn{ width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; background:var(--s2); border:1px solid var(--b2); cursor:pointer; flex-shrink:0; color:#ffffff; font-size:13px; }
[data-theme="light"] .tp-btn{ color:#1a2540; }
.tp-pill-thumb::before{ content:'☀'; }
[data-theme="light"] .tp-pill-thumb::before{ content:'🌙'; filter:grayscale(1) brightness(0.4); }

/* be chip */
.be-chip{ display:flex; align-items:center; gap:3px; background:var(--s2); border:1px solid var(--b2); border-radius:7px; padding:2px 6px; }
.be-chip-lbl{ font-family:'DM Mono',monospace; font-size:7px; text-transform:uppercase; letter-spacing:0.8px; color:var(--dim); }
.be-chip-val{ font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:#f0a020; }
.be-sbtn{ background:var(--s3); border:1px solid var(--b2); border-radius:2px; width:14px; height:9px; display:flex; align-items:center; justify-content:center; font-size:6px; color:var(--dim); cursor:pointer; line-height:1; }

/* index chip */
.idx-chip{ display:flex; align-items:center; gap:3px; background:var(--s2); border:1px solid rgba(60,136,232,0.35); border-radius:7px; padding:2px 6px; }
.idx-chip-lbl{ font-family:'DM Mono',monospace; font-size:7px; text-transform:uppercase; color:rgba(60,136,232,0.7); }
.idx-chip-val{ font-family:'DM Mono',monospace; font-size:13px; font-weight:500; color:#7ab4f5; min-width:36px; text-align:center; }
.idx-sbtn{ background:var(--s3); border:1px solid var(--b2); border-radius:2px; width:14px; height:9px; display:flex; align-items:center; justify-content:center; font-size:6px; color:var(--dim); cursor:pointer; line-height:1; }

/* chart */
.chart-area{ flex:1; min-height:0; position:relative; padding:4px 4px 0; overflow:hidden; }
canvas{ width:100%!important; height:100%!important; display:block; }
.chart-overlay{ position:absolute; top:4px; left:4px; right:4px; bottom:0; cursor:crosshair; z-index:10; touch-action:none; }

/* float card */
.float-card{ position:absolute; z-index:20; pointer-events:all; background:rgba(10,14,23,0.88); border:1px solid rgba(255,255,255,0.1); border-radius:9px; backdrop-filter:blur(8px); user-select:none; min-width:115px; }
[data-theme="light"] .float-card{ background:rgba(248,250,255,0.95); border-color:rgba(0,0,0,0.1); }
.float-handle{ cursor:grab; padding:3px 8px 2px; border-bottom:1px solid rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:center; }
.float-grip{ font-size:9px; color:rgba(255,255,255,0.2); letter-spacing:-1px; }
.float-body{ padding:5px 8px 6px; display:flex; flex-direction:column; gap:3px; }
.csb{ display:flex; align-items:baseline; justify-content:space-between; gap:8px; }
.csb-l{ font-family:'DM Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.6px; color:var(--dim); }
.csb-v{ font-family:'DM Mono',monospace; font-size:15px; font-weight:500; line-height:1; text-align:right; }
.csb.cmx .csb-v{ color:var(--cmax); } .csb.cav .csb-v{ color:var(--cavg); } .csb.cmn .csb-v{ color:var(--cmin); }
.csb-sep{ height:1px; background:rgba(255,255,255,0.08); margin:2px 0; }
.csb-sub{ font-family:'DM Mono',monospace; font-size:9px; text-align:right; }

/* Y markers */
.ym{ position:absolute; right:0; transform:translateY(-50%); width:13px; height:13px; border-radius:50%; border:2px solid #fff; cursor:ns-resize; box-shadow:0 1px 4px rgba(0,0,0,0.5); z-index:25; pointer-events:all; touch-action:none; }
.ym-lbl{ position:absolute; right:16px; top:50%; transform:translateY(-50%); font-family:'DM Mono',monospace; font-size:7px; color:#fff; background:rgba(10,14,23,0.78); border-radius:3px; padding:1px 3px; pointer-events:none; white-space:nowrap; }

/* bottom row */
.bottom-row{ display:flex; gap:5px; padding:5px 8px 6px; background:var(--surface); border-top:1px solid var(--border); flex-shrink:0; align-items:center; }
.bcard{ display:flex; flex-direction:column; gap:3px; border-radius:8px; padding:5px 8px; flex:1; }
.bcard-lbl{ font-family:'DM Mono',monospace; font-size:7px; text-transform:uppercase; letter-spacing:0.9px; color:rgba(255,255,255,0.28); line-height:1; }
[data-theme="light"] .bcard-lbl{ color:rgba(0,0,0,0.28); }
.card-omit{ background:rgba(199,125,255,0.06); border:1px solid rgba(199,125,255,0.18); }
.tog{ display:flex; background:var(--s2); border:1px solid var(--b2); border-radius:6px; overflow:hidden; }
.tb{ flex:1; height:26px; display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:10px; font-weight:500; color:var(--dim); cursor:pointer; border:none; background:transparent; transition:background 0.12s,color 0.12s; padding:0 6px; white-space:nowrap; user-select:none; }
.tb:not(:last-child){ border-right:1px solid var(--b2); }
.tb.on{ background:rgba(232,169,60,0.16); color:var(--accent); }
.stepper{ display:flex; align-items:center; background:var(--s2); border:1px solid var(--b2); border-radius:6px; overflow:hidden; height:26px; flex-shrink:0; }
.sb{ width:26px; height:26px; display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:16px; font-weight:300; color:var(--dim); cursor:pointer; border:none; background:transparent; line-height:1; user-select:none; }
.sb:first-child{ border-right:1px solid var(--b2); }
.sb:last-child{ border-left:1px solid var(--b2); }
.sv{ min-width:22px; text-align:center; font-family:'DM Mono',monospace; font-size:11px; font-weight:500; color:var(--accent); }
.omit-row{ display:flex; align-items:center; gap:5px; flex-wrap:nowrap; }

/* stats bar */
.stats{ padding:3px 8px 4px; background:var(--surface); border-top:1px solid var(--border); display:flex; gap:4px; flex-wrap:wrap; align-items:center; min-height:22px; flex-shrink:0; }
.pill{ background:var(--s2); border:1px solid var(--border); border-radius:10px; padding:2px 7px; font-family:'DM Mono',monospace; font-size:9px; display:flex; gap:3px; align-items:center; }
.pill .pl{ color:var(--dim); font-size:7px; text-transform:uppercase; }
.pill .pv{ color:var(--bright); font-weight:500; }
.pv.a{ color:var(--accent); } .pv.r{ color:var(--cmin); } .pv.g{ color:var(--cmax); }
.hint{ font-family:'DM Mono',monospace; font-size:9px; color:var(--dim); font-style:italic; }
</style>
</head>
<body>

<div class="rotate-prompt" id="rotatePrompt">
  <div class="rotate-icon">📱</div>
  <div class="rotate-title">Rotate Your Phone</div>
  <div class="rotate-sub">BPI-82 is best viewed in landscape mode</div>
</div>

<div class="topbar">
  <h1>BPI-82</h1>
  <span class="sub">Panamax · 1990–2026</span>
  <div class="topbar-spacer"></div>
  <div class="be-chip">
    <span class="be-chip-lbl">B/E</span>
    <span class="be-chip-val" id="beChipVal">12,000</span>
    <div style="display:flex;flex-direction:column;gap:1px;">
      <button class="be-sbtn" id="beUp">▲</button>
      <button class="be-sbtn" id="beDn">▼</button>
    </div>
  </div>
  <div class="idx-chip">
    <span class="idx-chip-lbl">IDX</span>
    <span class="idx-chip-val" id="idxVal">100%</span>
    <div style="display:flex;flex-direction:column;gap:1px;">
      <button class="idx-sbtn" id="idxUp">▲</button>
      <button class="idx-sbtn" id="idxDn">▼</button>
    </div>
  </div>
  <button class="tp-btn" id="gradToggleBtn" title="Gradient markers"></button>
  <button class="tp-btn" id="resetBtn" title="Reset" style="font-size:14px;">⟳</button>
  <div class="tp-btn" id="themeBtn"><div class="tp-pill-thumb"></div></div>
</div>

<div class="chart-area" id="chartArea">
  <canvas id="mainChart"></canvas>
  <div class="chart-overlay" id="chartOverlay"></div>

  <!-- Draggable float card -->
  <div class="float-card" id="floatCard" style="right:8px;top:15%;">
    <div class="float-handle" id="floatHandle"><span class="float-grip">⣿</span></div>
    <div class="float-body">
      <div class="csb cmx"><span class="csb-l">MAX</span><span class="csb-v" id="cMax">—</span></div>
      <div class="csb cav"><span class="csb-l">AVG</span><span class="csb-v" id="cAvg">—</span></div>
      <div class="csb cmn"><span class="csb-l">MIN</span><span class="csb-v" id="cMin">—</span></div>
      <div class="csb-sep"></div>
      <div class="tog" id="linesTgl">
        <button class="tb" data-idx="0">M</button>
        <button class="tb on" data-idx="1">Q</button>
        <button class="tb" data-idx="2">Y</button>
      </div>
      <div class="csb-sep"></div>
      <div class="csb-sub" id="floatRange"  style="color:var(--accent);display:none;font-size:10px;"></div>
      <div class="csb-sub" id="floatOmit"   style="color:var(--cmin);display:none;font-size:8px;"></div>
      <div class="csb-sub" id="floatIdx"    style="color:#7ab4f5;display:none;font-size:8px;"></div>
      <div class="csb-sep" id="floatSdSep" style="display:none;"></div>
      <div class="csb-sub" id="floatSdLbl"  style="display:none;font-size:7px;text-transform:uppercase;letter-spacing:0.8px;text-align:right;"></div>
      <div class="csb-sub" id="floatSd"     style="display:none;font-size:13px;font-weight:500;text-align:right;"></div>
      <div class="csb-sub" id="floatDays"   style="color:var(--dim);display:none;font-size:8px;text-align:right;"></div>
    </div>
  </div>

  <!-- Y-axis gradient markers -->
  <div id="yGradMarkers" style="display:none;">
    <div class="ym" id="gm5"  data-color="rgba(0,0,0,0.9)"     data-border="#555">   <div class="ym-lbl" id="gm5l">5k</div></div>
    <div class="ym" id="gm7"  data-color="rgba(90,15,15,1)"    data-border="#c04040"><div class="ym-lbl" id="gm7l">7k</div></div>
    <div class="ym" id="gm9"  data-color="rgba(220,60,60,1)"   data-border="#ff8080"><div class="ym-lbl" id="gm9l">9k</div></div>
    <div class="ym" id="gmBE" data-color="rgba(200,140,40,1)"  data-border="#f0a020"><div class="ym-lbl" id="gmBEl">B/E</div></div>
    <div class="ym" id="gm17" data-color="rgba(60,220,120,1)"  data-border="#90ffb0"><div class="ym-lbl" id="gm17l">17k</div></div>
    <div class="ym" id="gm24" data-color="rgba(20,90,50,1)"    data-border="#40c080"><div class="ym-lbl" id="gm24l">24k</div></div>
  </div>
</div><!-- /chart-area -->

<div class="bottom-row">
  <div class="tog" id="showTgl" style="flex-shrink:0;height:36px;">
    <button class="tb on" data-v="full" style="height:36px;font-size:10px;padding:0 8px;">FULL</button>
    <button class="tb" data-v="sel" style="height:36px;font-size:13px;padding:0 8px;">🔍</button>
  </div>
  <div class="bcard card-omit" style="flex:1;">
    <div class="bcard-lbl">Calc Omitting</div>
    <div class="omit-row">
      <div class="tog" id="dirTgl">
        <button class="tb on" data-val="TOP">⤒T</button>
        <button class="tb" data-val="BOTTOM">⤓B</button>
      </div>
      <div class="stepper">
        <button class="sb" id="stepDn">−</button>
        <span class="sv" id="stepV">0</span>
        <button class="sb" id="stepUp">+</button>
      </div>
      <div class="tog" id="omitUnitTgl">
        <button class="tb" data-val="MONTHS">M</button>
        <button class="tb on" data-val="QUARTERS">Q</button>
        <button class="tb" data-val="YEARS">Y</button>
      </div>
    </div>
  </div>
</div>

<div class="stats" id="statsBar"><div class="hint">tap or drag to select a period</div></div>

function getPeriodKey(d,unit){ if(unit==='M')return d.label; if(unit==='Q')return d.year+'-Q'+(d.quarter+1); return String(d.year); }
function getAllKeys(unit){ return [...new Set(allData.map(d=>getPeriodKey(d,unit)))].sort(); }
function keysBetween(kA,kB,unit){ const a=getAllKeys(unit),ia=a.indexOf(kA),ib=a.indexOf(kB); if(ia<0||ib<0)return new Set([kA]); return new Set(a.slice(Math.min(ia,ib),Math.max(ia,ib)+1)); }

function fmtBE(v){ return v.toLocaleString(); }

const chart = new Chart(ctx, {
  type:'line',
  data:{
    labels: allData.map(d=>d.label),
    datasets:[
      { label:'BPI-82', data:allData.map(d=>iv(d.value)), borderColor:'rgba(60,136,232,0.55)', backgroundColor:'rgba(60,136,232,0.05)', borderWidth:1.2, pointRadius:0, fill:true, tension:0.3 },

  },
  options:{
    responsive:true, maintainAspectRatio:false,
    animation:{ duration:100 },
    plugins:{ legend:{display:false}, tooltip:{enabled:false} },
    layout:{ padding:{ bottom:28 } },
    scales:{
      x:{ display:false },
      y:{ ticks:{ font:{family:'DM Mono',size:8}, color:'#5c7a99', callback:v=>v>=1000?(v/1000).toFixed(0)+'k':v }, grid:{color:'#111827'}, border:{color:'#1f2e4a'} }
    }
  },
  plugins:[{
    id:'custom',
    afterDraw(ch){
      const {ctx:c,scales:s,chartArea:ca}=ch;
      const xL=ca.left,xR=ca.right,yB=ca.bottom,h=ca.bottom-ca.top;

      // Selection bands
      if(selKeys.size>0&&!showOnly){
        let run=null;
        const flush=i=>{if(run===null)return;const x0=s.x.getPixelForValue(run),x1=s.x.getPixelForValue(i-1);c.save();c.fillStyle=isDark?'rgba(232,169,60,0.1)':'rgba(194,125,16,0.22)';c.fillRect(x0,ca.top,x1-x0+1,ca.bottom-ca.top);c.restore();run=null;};
        allData.forEach((d,i)=>{const inS=selKeys.has(getPeriodKey(d,selUnit));if(inS&&run===null)run=i;if(!inS&&run!==null)flush(i);});
        flush(allData.length);
      }

      // Gradient fill
      const beY=s.y.getPixelForValue(beValue);
      const y9k=s.y.getPixelForValue(iv(gVal9)),y7k=s.y.getPixelForValue(iv(gVal7));
      const y17k=s.y.getPixelForValue(iv(gVal17)),y5k=s.y.getPixelForValue(iv(gVal5)),y24k=s.y.getPixelForValue(iv(gVal24));
      const visMin=s.x.min??0,visMax=s.x.max??allData.length-1;
      const iMin=Math.max(0,Math.floor(visMin)),iMax=Math.min(allData.length-1,Math.ceil(visMax));
      const fs=window.curFinalSet,hasSelection=window.curSelSize>0;
      const f=v=>Math.max(0,Math.min(1,(s.y.getPixelForValue(v)-ca.top)/h));
      const grad=c.createLinearGradient(0,ca.top,0,ca.bottom);
      grad.addColorStop(0,'rgba(0,0,0,0.7)');
      grad.addColorStop(f(iv(gVal24)),'rgba(20,90,50,0.65)');
      grad.addColorStop(f(iv(gVal17)),'rgba(60,220,120,0.55)');
      grad.addColorStop(f(beValue),'rgba(128,128,128,0.06)');
      grad.addColorStop(f(iv(gVal9)),'rgba(220,60,60,0.55)');
      grad.addColorStop(f(iv(gVal7)),'rgba(90,15,15,0.65)');
      grad.addColorStop(1,'rgba(0,0,0,0.7)');
      for(let i=iMin;i<iMax;i++){
        const d1=allData[i],d2=allData[i+1];
        const x1=s.x.getPixelForValue(i),x2=s.x.getPixelForValue(i+1);
        const y1=s.y.getPixelForValue(iv(d1.value)),y2=s.y.getPixelForValue(iv(d2.value));
        const active=!hasSelection||(fs&&(fs.has(d1.label)||fs.has(d2.label)));
        c.save();c.beginPath();c.moveTo(x1,beY);c.lineTo(x1,y1);c.lineTo(x2,y2);c.lineTo(x2,beY);c.closePath();
        c.fillStyle=active?grad:'rgba(130,130,130,0.10)';c.fill();c.restore();
      }

      // B/E line
      if(beY>=ca.top-2&&beY<=ca.bottom+2){
        c.save();c.setLineDash([5,4]);c.strokeStyle='#f0a020';c.lineWidth=1.2;c.globalAlpha=0.85;c.beginPath();c.moveTo(xL,beY);c.lineTo(xR,beY);c.stroke();
        c.setLineDash([]);c.font='bold 8px DM Mono,monospace';c.fillStyle='#f0a020';c.globalAlpha=0.95;c.fillText('B/E '+beValue.toLocaleString(),xL+4,beY-3);c.restore();
      }

      // MIN/AVG/MAX lines
      if(window.curLines&&!showOnly){
        const{mn,mx,avg}=window.curLines;
        const yMn=s.y.getPixelForValue(mn),yMx=s.y.getPixelForValue(mx);
        c.save();c.fillStyle=isDark?'rgba(232,169,60,0.07)':'rgba(194,125,16,0.14)';c.fillRect(xL,Math.min(yMn,yMx),xR-xL,Math.abs(yMn-yMx));c.restore();
        [{val:mx,color:'#3ce8a0',dash:[5,4]},{val:avg,color:'#8899aa',dash:[3,3]},{val:mn,color:'#e84c3c',dash:[5,4]}].forEach(ln=>{
          const y=s.y.getPixelForValue(ln.val);if(y<ca.top-2||y>ca.bottom+2)return;
          c.save();c.setLineDash(ln.dash);c.strokeStyle=ln.color;c.lineWidth=1;c.globalAlpha=0.75;c.beginPath();c.moveTo(xL,y);c.lineTo(xR,y);c.stroke();
          c.setLineDash([]);c.font='bold 8px DM Mono,monospace';c.fillStyle=ln.color;c.globalAlpha=0.9;
          const txt=Math.round(ln.val).toLocaleString();c.fillText(txt,xR-c.measureText(txt).width-4,y-3);c.restore();
        });
      }

      // X axis labels
      const pxpm=(xR-xL)/Math.max((visMax-visMin+1),1);
      const showQ=pxpm>=4,showM=pxpm>=13;
      const rowH=10,yr0=yB+3;
      c.save();c.font='8px DM Mono,monospace';
      for(let i=Math.max(0,Math.floor(visMin));i<=Math.min(allData.length-1,Math.ceil(visMax));i++){
        const d=allData[i],x=s.x.getPixelForValue(i);
        if(x<xL-1||x>xR+1)continue;
        if(d.month===0){c.strokeStyle='#2a3f60';c.lineWidth=1;c.beginPath();c.moveTo(x,yB);c.lineTo(x,yB+2);c.stroke();c.fillStyle='#7a9ab8';c.fillText(String(d.year),x+1,yr0+8);}
        if(showQ&&d.month%3===0&&d.month!==0){c.fillStyle='#4a6a88';c.fillText(QABBR[d.quarter],x+1,yr0+8);}
        if(showM&&d.month%3!==0){c.fillStyle='#384e64';c.fillText(MABBR[d.month],x+1,yr0+8);}
      }
      c.restore();
    }
  }]
});

// ===== TOUCH SELECTION =====
let touching=false, touchStartKey=null;
function pixelToKey(cx){
  const rect=document.getElementById('mainChart').getBoundingClientRect();
  const sc=chart.scales.x;
  const idx=Math.max(0,Math.min(allData.length-1,Math.round(sc.getValueForPixel(cx-rect.left))));
  return getPeriodKey(allData[idx],selUnit);
}
const overlay=document.getElementById('chartOverlay');

overlay.addEventListener('touchstart',e=>{e.preventDefault();touching=true;touchStartKey=pixelToKey(e.touches[0].clientX);selKeys=new Set([touchStartKey]);updateChart();},{passive:false});
overlay.addEventListener('touchmove',e=>{e.preventDefault();if(!touching)return;selKeys=keysBetween(touchStartKey,pixelToKey(e.touches[0].clientX),selUnit);updateChart();},{passive:false});
overlay.addEventListener('touchend',e=>{
  touching=false;
  if(selKeys.size>0&&selKeys.size<3){selKeys=new Set();updateChart();return;}
  if(selKeys.size===1&&touchStartKey){
    showOnly=!showOnly;
    syncShowTgl(); updateChart(); return;
  }
  updateChart();
});

// Mouse fallbacks
overlay.addEventListener('mousedown',e=>{touching=true;touchStartKey=pixelToKey(e.clientX);selKeys=new Set([touchStartKey]);updateChart();});
window.addEventListener('mousemove',e=>{if(!touching)return;selKeys=keysBetween(touchStartKey,pixelToKey(e.clientX),selUnit);updateChart();});
window.addEventListener('mouseup',()=>{
  if(!touching)return; touching=false;
  if(selKeys.size>0&&selKeys.size<3){selKeys=new Set();updateChart();return;}
  if(selKeys.size===1&&touchStartKey){showOnly=!showOnly;syncShowTgl();updateChart();return;}
  updateChart();
});

function syncShowTgl(){ const t=document.getElementById('showTgl'); if(t)t.querySelectorAll('.tb').forEach(b=>b.classList.toggle('on',b.dataset.v===(showOnly?'sel':'full'))); }
function makeToggle(id,cls,cb){ document.getElementById(id).addEventListener('click',e=>{ const btn=e.target.closest('.'+cls);if(!btn)return; document.querySelectorAll('#'+id+' .'+cls).forEach(b=>b.classList.remove('on')); btn.classList.add('on');cb(btn);updateChart(); }); }

makeToggle('showTgl','tb',b=>{ showOnly=b.dataset.v==='sel'; });
makeToggle('dirTgl','tb',b=>{ omitDir=b.dataset.val; });
makeToggle('omitUnitTgl','tb',b=>{ omitUnit=b.dataset.val; });
makeToggle('linesTgl','tb',b=>{ linesUnit=UNIT_MAP[parseInt(b.dataset.idx)]; });
document.getElementById('stepDn').addEventListener('click',()=>{ if(omitN>0){omitN--;document.getElementById('stepV').textContent=omitN;updateChart();} });
document.getElementById('stepUp').addEventListener('click',()=>{ if(omitN<10){omitN++;document.getElementById('stepV').textContent=omitN;updateChart();} });

// B/E
document.getElementById('beUp').addEventListener('click',()=>{ beValue+=100;document.getElementById('beChipVal').textContent=fmtBE(beValue);updateChart(); });
document.getElementById('beDn').addEventListener('click',()=>{ beValue=Math.max(0,beValue-100);document.getElementById('beChipVal').textContent=fmtBE(beValue);updateChart(); });

// Index
function setIndexMult(v){
  indexMult=Math.max(0.75,Math.min(1.25,Math.round(v*100)/100));
  const el=document.getElementById('idxVal');
  el.textContent=Math.round(indexMult*100)+'%';
  el.style.color=indexMult===1?'#7ab4f5':indexMult>1?'#3ce8a0':'#e84c3c';
  updateChart();
}
document.getElementById('idxUp').addEventListener('click',()=>setIndexMult(indexMult+0.01));
document.getElementById('idxDn').addEventListener('click',()=>setIndexMult(indexMult-0.01));

// Reset
document.getElementById('resetBtn').addEventListener('click',()=>{
  selKeys=new Set(); showOnly=false;
  delete chart.options.scales.x.min; delete chart.options.scales.x.max;
  syncShowTgl(); updateChart();
});

// ===== DATA LOGIC =====
function groupBy(months,unit){ const map={}; months.forEach(d=>{ const key=unit==='QUARTERS'?d.year+'-Q'+(d.quarter+1):String(d.year); if(!map[key])map[key]={key,months:[],avg:0}; map[key].months.push(d); }); Object.values(map).forEach(g=>{g.avg=g.months.reduce((s,d)=>s+d.value,0)/g.months.length;}); return Object.values(map).sort((a,b)=>a.key<b.key?-1:1); }
function omitFromSelection(sel){ if(omitN===0)return sel; if(omitUnit==='MONTHS'){const bad=new Set([...sel].sort((a,b)=>omitDir==='TOP'?b.value-a.value:a.value-b.value).slice(0,omitN).map(d=>d.label));return sel.filter(d=>!bad.has(d.label));} const groups=groupBy(sel,omitUnit);const badKeys=new Set([...groups].sort((a,b)=>omitDir==='TOP'?b.avg-a.avg:a.avg-b.avg).slice(0,omitN).map(g=>g.key));return sel.filter(d=>!badKeys.has(omitUnit==='QUARTERS'?d.year+'-Q'+(d.quarter+1):String(d.year))); }
function computeLines(months){ if(!months.length)return null; const lu=UNIT_NAMES[linesUnit]; const vals=lu==='MONTHS'?months.map(d=>iv(d.value)):groupBy(months,lu).map(g=>iv(g.avg)); if(!vals.length)return null; return{mn:Math.min(...vals),mx:Math.max(...vals),avg:Math.round(vals.reduce((a,b)=>a+b,0)/vals.length)}; }

function updateChart(){
  const selected=selKeys.size>0?allData.filter(d=>selKeys.has(getPeriodKey(d,selUnit))):[];
  const final=omitFromSelection(selected);
  const finalSet=new Set(final.map(d=>d.label));
  chart.data.datasets[0].data=allData.map(d=>iv(d.value));
  chart.data.datasets[1].data=allData.map(d=>finalSet.has(d.label)?iv(d.value):null);
  window.curFinalSet=finalSet; window.curSelSize=selKeys.size;
  if(showOnly&&final.length>0){const s=final.slice().sort((a,b)=>a.date-b.date);const si=allData.indexOf(s[0]),ei=allData.indexOf(s[s.length-1]);chart.options.scales.x.min=Math.max(0,si-1);chart.options.scales.x.max=Math.min(allData.length-1,ei+1);}
  else{delete chart.options.scales.x.min;delete chart.options.scales.x.max;}
  const lines=computeLines(final); window.curLines=lines; chart.update('none');
  const fmt=v=>Math.round(v).toLocaleString();
  document.getElementById('cMax').textContent=lines?fmt(lines.mx):'—';
  document.getElementById('cAvg').textContent=lines?fmt(lines.avg):'—';
  document.getElementById('cMin').textContent=lines?fmt(lines.mn):'—';

  const fr=document.getElementById('floatRange'),fo=document.getElementById('floatOmit'),fi=document.getElementById('floatIdx');
  if(final.length>0){const srt=final.slice().sort((a,b)=>a.date-b.date);const fd=fmtDate(srt[0].date),ld=fmtDate(srt[srt.length-1].date);if(fr){fr.textContent=fd===ld?fd:fd+' – '+ld;fr.style.display='block';}}else{if(fr)fr.style.display='none';}
  if(fo){if(omitN>0){fo.textContent='omit '+omitN+' '+omitDir.toLowerCase()+' '+omitUnit.toLowerCase();fo.style.display='block';}else{fo.style.display='none';}}
  if(fi){if(indexMult!==1){fi.textContent='index '+Math.round(indexMult*100)+'%';fi.style.display='block';}else{fi.style.display='none';}}

  // Surplus / deficit
  const fSdSep=document.getElementById('floatSdSep'),fSdLbl=document.getElementById('floatSdLbl'),fSdEl=document.getElementById('floatSd'),fDays=document.getElementById('floatDays');
  if(final.length>0){
    let cumSD=0,totalDays=0;
    final.forEach(d=>{const days=daysInMonth(d);totalDays+=days;cumSD+=(iv(d.value)-beValue)*days;});
    const isSurplus=cumSD>=0;
    const sdStr=(isSurplus?'+':'-')+Math.abs(Math.round(cumSD)).toLocaleString();
    const sdColor=isSurplus?'var(--cmax)':'var(--cmin)';
    if(fSdSep)fSdSep.style.display='block';
    if(fSdLbl){fSdLbl.textContent=(isSurplus?'Surplus':'Deficit')+' vs B/E';fSdLbl.style.color=sdColor;fSdLbl.style.display='block';}
    if(fSdEl){fSdEl.textContent=sdStr;fSdEl.style.color=sdColor;fSdEl.style.display='block';}
    if(fDays){fDays.textContent=String(totalDays).padStart(4,'0')+' days';fDays.style.display='block';}
    // Stats bar
    const srt=final.slice().sort((a,b)=>a.date-b.date);
    const fd=fmtDate(srt[0].date),ld=fmtDate(srt[srt.length-1].date);
    const on=omitN>0?`<div class="pill"><span class="pl">OMIT</span><span class="pv r">${omitN} ${omitDir} ${omitUnit}</span></div>`:'';
    const idxPill=indexMult!==1?`<div class="pill"><span class="pl">IDX</span><span class="pv" style="color:#7ab4f5">${Math.round(indexMult*100)}%</span></div>`:'';
    document.getElementById('statsBar').innerHTML=`<div class="pill"><span class="pl">SEL</span><span class="pv a">${selKeys.size} ${UNIT_NAMES[selUnit]}</span></div><div class="pill"><span class="pl">DAYS</span><span class="pv a">${String(totalDays).padStart(4,'0')}</span></div>${on}${idxPill}<div class="pill"><span class="pl">${isSurplus?'SURPLUS':'DEFICIT'}</span><span class="pv ${isSurplus?'g':'r'}">${sdStr}</span></div>`;
  } else {
    if(fSdSep)fSdSep.style.display='none';
    if(fSdLbl)fSdLbl.style.display='none';
    if(fSdEl)fSdEl.style.display='none';
    if(fDays)fDays.style.display='none';
    if(!selKeys.size)document.getElementById('statsBar').innerHTML='<div class="hint">tap or drag to select a period</div>';
    else document.getElementById('statsBar').innerHTML='<div class="hint">nothing after omit</div>';
  }
}

// ===== THEME =====
function applyTheme(dark){
  document.documentElement.dataset.theme=dark?'dark':'light';
  chart.data.datasets[0].borderColor=dark?'rgba(60,136,232,0.55)':'rgba(40,100,210,0.65)';
  chart.data.datasets[0].backgroundColor=dark?'rgba(60,136,232,0.05)':'rgba(60,136,232,0.09)';
  chart.options.scales.y.grid.color=dark?'#111827':'#e0e6f4';
  chart.options.scales.y.border.color=dark?'#1f2e4a':'#c8d0e8';
  chart.options.scales.y.ticks.color=dark?'#5c7a99':'#6878a0';
  chart.update('none');
}
document.getElementById('themeBtn').addEventListener('click',()=>{ isDark=!isDark; applyTheme(isDark); });
applyTheme(isDark);

// ===== Y-AXIS GRADIENT MARKERS =====
let showGradMarkers=false;
const gradMarkers=[
  {id:'gm5', lblId:'gm5l', getVal:()=>gVal5, setVal:v=>{gVal5=v;}},
  {id:'gm7', lblId:'gm7l', getVal:()=>gVal7, setVal:v=>{gVal7=v;}},
  {id:'gm9', lblId:'gm9l', getVal:()=>gVal9, setVal:v=>{gVal9=v;}},
  {id:'gmBE',lblId:'gmBEl',getVal:()=>beValue,setVal:v=>{beValue=v;document.getElementById('beChipVal').textContent=fmtBE(v);}},
  {id:'gm17',lblId:'gm17l',getVal:()=>gVal17,setVal:v=>{gVal17=v;}},
  {id:'gm24',lblId:'gm24l',getVal:()=>gVal24,setVal:v=>{gVal24=v;}},
];
gradMarkers.forEach(m=>{const el=document.getElementById(m.id);el.style.background=el.dataset.color;el.style.borderColor=el.dataset.border;});
function fmtGradLbl(v){return v>=1000?(v/1000).toFixed(0)+'k':String(v);}
function updateYMarkerPositions(){
  const wr=document.getElementById('chartArea').getBoundingClientRect();
  const sc=chart.scales.y;if(!sc)return;
  const cr=document.getElementById('mainChart').getBoundingClientRect();
  const offsetTop=cr.top-wr.top;
  gradMarkers.forEach(m=>{
    const el=document.getElementById(m.id),lbl=document.getElementById(m.lblId);
    el.style.top=(sc.getPixelForValue(iv(m.getVal()))+offsetTop)+'px';
    lbl.textContent=m.id==='gmBE'?'B/E '+fmtGradLbl(m.getVal()):fmtGradLbl(m.getVal());
  });
}
let ymDragging=null;
gradMarkers.forEach(m=>{
  const el=document.getElementById(m.id);
  el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();ymDragging=m;},{passive:false});
  el.addEventListener('mousedown',e=>{e.preventDefault();e.stopPropagation();ymDragging=m;});
});
window.addEventListener('touchmove',e=>{
  if(!ymDragging)return;e.preventDefault();
  const sc=chart.scales.y,cr=document.getElementById('mainChart').getBoundingClientRect();
  const snapped=Math.round(sc.getValueForPixel(e.touches[0].clientY-cr.top)/500)*500;
  ymDragging.setVal(Math.max(0,Math.min(150000,snapped)));
  updateYMarkerPositions();updateChart();
},{passive:false});
window.addEventListener('mousemove',e=>{
  if(!ymDragging)return;
  const sc=chart.scales.y,cr=document.getElementById('mainChart').getBoundingClientRect();
  const snapped=Math.round(sc.getValueForPixel(e.clientY-cr.top)/500)*500;
  ymDragging.setVal(Math.max(0,Math.min(150000,snapped)));
  updateYMarkerPositions();updateChart();
});
window.addEventListener('touchend',()=>{ymDragging=null;});
window.addEventListener('mouseup',()=>{if(!touching)ymDragging=null;});

function thermSvg(on){
  return `<svg width="16" height="20" viewBox="0 0 18 22" fill="none"><rect x="7.5" y="1" width="3" height="13" rx="1.5" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="17" r="3.5" stroke="currentColor" stroke-width="1.5"/><line x1="9" y1="4" x2="9" y2="14" stroke="#f0a020" stroke-width="1.5" stroke-linecap="round"/><circle cx="9" cy="17" r="2" fill="#f0a020"/>${!on?'<line x1="2" y1="2" x2="16" y2="20" stroke="currentColor" stroke-width="1.8"/>':''}</svg>`;
}
const gradToggleBtn=document.getElementById('gradToggleBtn');
gradToggleBtn.innerHTML=thermSvg(true);
gradToggleBtn.style.opacity='0.6';
gradToggleBtn.addEventListener('click',()=>{
  showGradMarkers=!showGradMarkers;
  document.getElementById('yGradMarkers').style.display=showGradMarkers?'block':'none';
  gradToggleBtn.innerHTML=thermSvg(!showGradMarkers);
  gradToggleBtn.style.opacity=showGradMarkers?'1':'0.6';
  if(showGradMarkers)setTimeout(updateYMarkerPositions,50);
});
window.addEventListener('resize',()=>{if(showGradMarkers)setTimeout(updateYMarkerPositions,80);});

// ===== FLOAT CARD DRAG =====
const floatCard=document.getElementById('floatCard');
let fcDrag=false,fcOx=0,fcOy=0;
function fcStart(cx,cy){
  fcDrag=true;
  const r=floatCard.getBoundingClientRect(),wr=document.getElementById('chartArea').getBoundingClientRect();
  floatCard.style.right='auto';floatCard.style.left=(r.left-wr.left)+'px';floatCard.style.top=(r.top-wr.top)+'px';
  fcOx=cx-r.left;fcOy=cy-r.top;
}
function fcMove(cx,cy){
  if(!fcDrag)return;
  const wr=document.getElementById('chartArea').getBoundingClientRect();
  let nx=cx-wr.left-fcOx,ny=cy-wr.top-fcOy;
  nx=Math.max(0,Math.min(wr.width-floatCard.offsetWidth,nx));
  ny=Math.max(0,Math.min(wr.height-floatCard.offsetHeight,ny));
  floatCard.style.left=nx+'px';floatCard.style.top=ny+'px';
}
document.getElementById('floatHandle').addEventListener('mousedown',e=>{e.stopPropagation();fcStart(e.clientX,e.clientY);});
document.getElementById('floatHandle').addEventListener('touchstart',e=>{e.stopPropagation();fcStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
window.addEventListener('mousemove',e=>fcMove(e.clientX,e.clientY));
window.addEventListener('touchmove',e=>{if(fcDrag)fcMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
window.addEventListener('mouseup',()=>{fcDrag=false;});
window.addEventListener('touchend',()=>{fcDrag=false;});

// ===== ROTATE PROMPT =====
function checkOrientation(){
  document.getElementById('rotatePrompt').classList.toggle('visible',window.innerHeight>window.innerWidth);
}
checkOrientation();
window.addEventListener('resize',checkOrientation);
window.addEventListener('orientationchange',()=>setTimeout(checkOrientation,200));

updateChart();
